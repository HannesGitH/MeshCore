; Generic ESP32-S3 + external SX1276 (LoRa). Adjust pins to match your wiring.

[Generic_ESP32_S3_SX1276]
extends = esp32_base
board = esp32-s3-devkitc-1
build_flags =
  ${esp32_base.build_flags}
  -I variants/generic_esp32_s3_sx1276
  -D GENERIC_ESP32_S3_SX1276
  -D P_LORA_NSS=10
  -D P_LORA_RESET=9
  -D P_LORA_DIO_0=4
  -D P_LORA_DIO_1=5
  -D P_LORA_SCLK=12
  -D P_LORA_MOSI=13
  -D P_LORA_MISO=11
  -D P_LORA_TX_LED=2
  -D PIN_VBAT_READ=-1
  -D PIN_USER_BTN=0
  -D PIN_BOARD_SDA=18
  -D PIN_BOARD_SCL=17
  -D PIN_OLED_RESET=-1
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D SX127X_CURRENT_LIMIT=120
  ; these would only be used if the chip had a RF switch
  ; -D SX176X_RXEN=7
  ; -D SX176X_TXEN=6
  -D LORA_TX_POWER=20
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/generic_esp32_s3_sx1276>
lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13

; === Repeater ===
[env:Generic_ESP32_S3_SX1276_repeater]
extends = Generic_ESP32_S3_SX1276
build_flags =
  ${Generic_ESP32_S3_SX1276.build_flags}
  -D ADVERT_NAME='"ESP32-S3 SX1276 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Generic_ESP32_S3_SX1276.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${Generic_ESP32_S3_SX1276.lib_deps}
  ${esp32_ota.lib_deps}

; === Repeater + ESP-NOW bridge ===
[env:Generic_ESP32_S3_SX1276_repeater_bridge_espnow]
extends = Generic_ESP32_S3_SX1276
build_flags =
  ${Generic_ESP32_S3_SX1276.build_flags}
  -D ADVERT_NAME='"ESP32-S3 SX1276 ESPNow Bridge"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_ESPNOW_BRIDGE=1
;  -D BRIDGE_DEBUG=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Generic_ESP32_S3_SX1276.build_src_filter}
  +<helpers/bridges/ESPNowBridge.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${Generic_ESP32_S3_SX1276.lib_deps}
  ${esp32_ota.lib_deps}

; === Terminal chat (serial only, no display) ===
[env:Generic_ESP32_S3_SX1276_terminal_chat]
extends = Generic_ESP32_S3_SX1276
build_flags =
  ${Generic_ESP32_S3_SX1276.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Generic_ESP32_S3_SX1276.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps =
  ${Generic_ESP32_S3_SX1276.lib_deps}
  densaugeo/base64 @ ~1.4.0

; === Room server ===
[env:Generic_ESP32_S3_SX1276_room_server]
extends = Generic_ESP32_S3_SX1276
build_flags =
  ${Generic_ESP32_S3_SX1276.build_flags}
  -D ADVERT_NAME='"ESP32-S3 SX1276 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Generic_ESP32_S3_SX1276.build_src_filter}
  +<../examples/simple_room_server>
lib_deps =
  ${Generic_ESP32_S3_SX1276.lib_deps}
  ${esp32_ota.lib_deps}

; === Companion radio (USB) – optional I2C display on SDA/SCL ===
[env:Generic_ESP32_S3_SX1276_companion_radio_usb]
extends = Generic_ESP32_S3_SX1276
upload_speed = 115200
build_flags =
  ${Generic_ESP32_S3_SX1276.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
build_src_filter = ${Generic_ESP32_S3_SX1276.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Generic_ESP32_S3_SX1276.lib_deps}
  densaugeo/base64 @ ~1.4.0

; === Companion radio (BLE) – optional I2C display on SDA/SCL ===
[env:Generic_ESP32_S3_SX1276_companion_radio_ble]
extends = Generic_ESP32_S3_SX1276
build_flags =
  ${Generic_ESP32_S3_SX1276.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Generic_ESP32_S3_SX1276.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Generic_ESP32_S3_SX1276.lib_deps}
  densaugeo/base64 @ ~1.4.0
