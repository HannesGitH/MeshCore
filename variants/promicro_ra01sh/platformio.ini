; -----------------------------------------------------------------------------
; nRF52 Pro Micro + RA-01SH (Ai-Thinker SX1262) custom wiring
;
;   RA-01SH -> nRF52 Pro Micro
;     NSS   -> P0.11   (Arduino pin  7)
;     MOSI  -> P1.00   (Arduino pin  6)
;     MISO  -> P0.24   (Arduino pin  5)
;     SCK   -> P0.22   (Arduino pin  4)
;     BUSY  -> P0.20   (Arduino pin  3)
;     DIO1  -> P0.02   (Arduino pin 15)
;     RST   -> P1.15   (Arduino pin 14)
;     3V3   -> 3V3
;     GND   -> GND
;
;   Optional GPS:
;     GPS RX -> P0.09  (MCU TX, Arduino pin 10)
;     GPS TX -> P0.10  (MCU RX, Arduino pin 11)
;     GPS EN -> P1.06  (Arduino pin  9)
;     GPS VCC -> 3V3
;     GPS GND -> GND
; -----------------------------------------------------------------------------

[PromicroRA01SH]
extends = nrf52_base
board = promicro_nrf52840
build_flags = ${nrf52_base.build_flags}
  -I variants/promicro_ra01sh
  -D PROMICRO_RA01SH
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D PIN_BOARD_SDA=0
  -D PIN_BOARD_SCL=1
  -D PIN_OLED_RESET=-1
  -D PIN_USER_BTN=2
  -D PIN_GPS_RX=11
  -D PIN_GPS_TX=10
  -D PIN_GPS_EN=9
  -D ENV_INCLUDE_GPS=1
  -D ENV_INCLUDE_AHTX0=1
  -D ENV_INCLUDE_BME280=1
  -D ENV_INCLUDE_BMP280=1
  -D ENV_INCLUDE_INA3221=1
  -D ENV_INCLUDE_INA219=1
build_src_filter = ${nrf52_base.build_src_filter}
  +<helpers/sensors>
  +<../variants/promicro_ra01sh>
lib_deps = ${nrf52_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13
  adafruit/Adafruit INA3221 Library @ ^1.0.1
  adafruit/Adafruit INA219 @ ^1.2.3
  adafruit/Adafruit AHTX0 @ ^2.0.5
  adafruit/Adafruit BME280 Library @ ^2.3.0
  adafruit/Adafruit BMP280 Library@^2.6.8
  stevemarple/MicroNMEA @ ^2.0.6

[env:PromicroRA01SH_repeater]
extends = PromicroRA01SH
build_src_filter = ${PromicroRA01SH.build_src_filter}
  +<../examples/simple_repeater>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
build_flags =
  ${PromicroRA01SH.build_flags}
  -D ADVERT_NAME='"ProMicro RA-01SH Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D DISPLAY_CLASS=SSD1306Display
lib_deps = ${PromicroRA01SH.lib_deps}
  adafruit/RTClib @ ^2.1.3

[env:PromicroRA01SH_room_server]
extends = PromicroRA01SH
build_src_filter = ${PromicroRA01SH.build_src_filter}
  +<../examples/simple_room_server>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
build_flags = ${PromicroRA01SH.build_flags}
  -D ADVERT_NAME='"ProMicro RA-01SH Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
  -D DISPLAY_CLASS=SSD1306Display
lib_deps = ${PromicroRA01SH.lib_deps}
  adafruit/RTClib @ ^2.1.3

[env:PromicroRA01SH_terminal_chat]
extends = PromicroRA01SH
build_flags = ${PromicroRA01SH.build_flags}
  -D MAX_CONTACTS=100
  -D MAX_GROUP_CHANNELS=1
build_src_filter = ${PromicroRA01SH.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps = ${PromicroRA01SH.lib_deps}
  densaugeo/base64 @ ~1.4.0
  adafruit/RTClib @ ^2.1.3

[env:PromicroRA01SH_companion_radio_usb]
extends = PromicroRA01SH
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags = ${PromicroRA01SH.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter = ${PromicroRA01SH.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${PromicroRA01SH.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0

[env:PromicroRA01SH_companion_radio_ble]
extends = PromicroRA01SH
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 712704
build_flags = ${PromicroRA01SH.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
  -D DISPLAY_CLASS=SSD1306Display
  -D MESH_DEBUG=1
build_src_filter = ${PromicroRA01SH.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps = ${PromicroRA01SH.lib_deps}
  adafruit/RTClib @ ^2.1.3
  densaugeo/base64 @ ~1.4.0

[env:PromicroRA01SH_sensor]
extends = PromicroRA01SH
build_flags =
  ${PromicroRA01SH.build_flags}
  -D ADVERT_NAME='"ProMicro RA-01SH Sensor"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D DISPLAY_CLASS=SSD1306Display
build_src_filter = ${PromicroRA01SH.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_sensor>
lib_deps =
  ${PromicroRA01SH.lib_deps}
