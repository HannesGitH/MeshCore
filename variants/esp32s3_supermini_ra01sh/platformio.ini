; -----------------------------------------------------------------------------
; ESP32-S3 SuperMini + RA-01SH (Ai-Thinker SX1262) custom wiring
;
;   RA-01SH -> ESP32-S3 SuperMini
;     NSS   -> GPIO  5
;     MOSI  -> GPIO  6
;     MISO  -> GPIO  7
;     SCK   -> GPIO  8
;     BUSY  -> GPIO 20
;     DIO1  -> GPIO  2
;     TXEN  -> GPIO  3
;     RXEN  -> GPIO 10
;     RST   -> not connected (RADIOLIB_NC) - override via -D P_LORA_RESET=<pin>
;     3V3   -> 3V3
;     GND   -> GND
;
; NOTE: GPIO 19/20 on the ESP32-S3 are shared with the USB D-/D+ lines.
;       Using GPIO 20 for BUSY means you cannot rely on the on-chip USB-CDC
;       serial (you'll need to upload/monitor via UART0 on RX/TX) unless your
;       board exposes a separate USB-UART bridge.
; -----------------------------------------------------------------------------

[ESP32S3_SuperMini_RA01SH]
extends = esp32_base
board = esp32-s3-devkitc-1
build_flags =
  ${esp32_base.build_flags}
  -I variants/esp32s3_supermini_ra01sh
  -D ESP32S3_SUPERMINI_RA01SH
  -D P_LORA_DIO_1=2
  -D P_LORA_NSS=5
  -D P_LORA_MOSI=6
  -D P_LORA_MISO=7
  -D P_LORA_SCLK=8
  -D P_LORA_BUSY=20
  -D P_LORA_RESET=RADIOLIB_NC
  -D SX126X_TXEN=3
  -D SX126X_RXEN=10
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D PIN_USER_BTN=0    ; on-board BOOT button (active LOW)
  -D PIN_OLED_RESET=-1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/esp32s3_supermini_ra01sh>
lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13

; === Repeater ===
[env:ESP32S3_SuperMini_RA01SH_repeater]
extends = ESP32S3_SuperMini_RA01SH
build_src_filter = ${ESP32S3_SuperMini_RA01SH.build_src_filter}
  +<../examples/simple_repeater>
build_flags =
  ${ESP32S3_SuperMini_RA01SH.build_flags}
  -D ADVERT_NAME='"ESP32-S3 SuperMini RA-01SH Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps =
  ${ESP32S3_SuperMini_RA01SH.lib_deps}
  ${esp32_ota.lib_deps}

; === Room server ===
[env:ESP32S3_SuperMini_RA01SH_room_server]
extends = ESP32S3_SuperMini_RA01SH
build_src_filter = ${ESP32S3_SuperMini_RA01SH.build_src_filter}
  +<../examples/simple_room_server>
build_flags =
  ${ESP32S3_SuperMini_RA01SH.build_flags}
  -D ADVERT_NAME='"ESP32-S3 SuperMini RA-01SH Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps =
  ${ESP32S3_SuperMini_RA01SH.lib_deps}
  ${esp32_ota.lib_deps}

; === Terminal chat (serial only, no display) ===
[env:ESP32S3_SuperMini_RA01SH_terminal_chat]
extends = ESP32S3_SuperMini_RA01SH
build_flags =
  ${ESP32S3_SuperMini_RA01SH.build_flags}
  -D MAX_CONTACTS=100
  -D MAX_GROUP_CHANNELS=1
build_src_filter = ${ESP32S3_SuperMini_RA01SH.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps =
  ${ESP32S3_SuperMini_RA01SH.lib_deps}
  densaugeo/base64 @ ~1.4.0

; === Companion radio (USB) ===
[env:ESP32S3_SuperMini_RA01SH_companion_radio_usb]
extends = ESP32S3_SuperMini_RA01SH
upload_speed = 115200
build_flags =
  ${ESP32S3_SuperMini_RA01SH.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${ESP32S3_SuperMini_RA01SH.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${ESP32S3_SuperMini_RA01SH.lib_deps}
  densaugeo/base64 @ ~1.4.0

; === Companion radio (BLE) ===
[env:ESP32S3_SuperMini_RA01SH_companion_radio_ble]
extends = ESP32S3_SuperMini_RA01SH
build_flags =
  ${ESP32S3_SuperMini_RA01SH.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
;  -D BLE_DEBUG_LOGGING=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${ESP32S3_SuperMini_RA01SH.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${ESP32S3_SuperMini_RA01SH.lib_deps}
  densaugeo/base64 @ ~1.4.0
